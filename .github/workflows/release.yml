name: release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - id: token
        uses: hostwithquantum/setup-gh-token@f774999c518eba6e44879037fa3fe0364181c0cd # v1.0.1
        with:
          client-id: ${{ secrets.RUNWAY_CI_BOT_APP_ID }}
          private-key: ${{ secrets.RUNWAY_CI_BOT_PRIVATE_KEY }}
          owner: hostwithquantum
          repositories: setup-mc
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.token.outputs.token }}
          persist-credentials: false
      - run: gh release create "${GITHUB_REF_NAME}" --generate-notes
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}